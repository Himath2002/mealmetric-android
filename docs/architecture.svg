<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="620" viewBox="0 0 1440 620" role="img">
  <title>MealMetric architecture</title>
  <desc>The main interface connects to a local Room journal, an optional Nutritionix search path, and Android local photo selection.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0 10 5 0 10Z" fill="#0F766E"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#153D35" flood-opacity=".1"/>
    </filter>
  </defs>
  <rect width="1440" height="620" rx="32" fill="#F4F8F5"/>
  <text x="72" y="65" fill="#153D35" font-family="Arial, sans-serif" font-size="29" font-weight="800">Architecture with explicit data boundaries</text>
  <text x="72" y="97" fill="#56665D" font-family="Arial, sans-serif" font-size="16">One local source of truth, two optional device/service edges</text>

  <g transform="translate(72 162)" filter="url(#shadow)">
    <rect width="282" height="296" rx="24" fill="#153D35"/>
    <circle cx="47" cy="47" r="25" fill="#B7E36D"/>
    <path d="M34 49a13 13 0 0 0 26 0h-4a9 9 0 0 1-18 0Z" fill="#0F766E"/>
    <path d="M38 44a9 9 0 0 1 18 0Z" fill="#FFFFFF"/>
    <text x="82" y="45" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="22" font-weight="800">Interface</text>
    <text x="82" y="67" fill="#AFC6B8" font-family="Arial, sans-serif" font-size="12">MainActivity</text>
    <rect x="26" y="99" width="230" height="55" rx="13" fill="#224D44"/>
    <text x="43" y="124" fill="#D9F5E8" font-family="Arial, sans-serif" font-size="12" font-weight="700">Material 3 XML</text>
    <text x="43" y="142" fill="#AFC6B8" font-family="Arial, sans-serif" font-size="11">View Binding</text>
    <rect x="26" y="167" width="230" height="55" rx="13" fill="#224D44"/>
    <text x="43" y="192" fill="#D9F5E8" font-family="Arial, sans-serif" font-size="12" font-weight="700">Daily summary + journal</text>
    <text x="43" y="210" fill="#AFC6B8" font-family="Arial, sans-serif" font-size="11">Lifecycle-aware observation</text>
    <rect x="26" y="235" width="230" height="35" rx="17.5" fill="#B7E36D"/>
    <text x="141" y="258" text-anchor="middle" fill="#153D35" font-family="Arial, sans-serif" font-size="11" font-weight="800">USER-INITIATED ACTIONS</text>
  </g>

  <path d="M354 245H445" stroke="#0F766E" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="399" y="231" text-anchor="middle" fill="#56665D" font-family="Arial, sans-serif" font-size="11">observe / write</text>
  <path d="M354 380H445" stroke="#0F766E" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="399" y="366" text-anchor="middle" fill="#56665D" font-family="Arial, sans-serif" font-size="11">search / select</text>

  <g transform="translate(466 140)">
    <rect width="413" height="164" rx="22" fill="#FFFFFF" stroke="#C7D5CC" filter="url(#shadow)"/>
    <circle cx="44" cy="43" r="22" fill="#D9F5E8"/>
    <path d="M31 38h26v18H31Z" fill="none" stroke="#0F766E" stroke-width="2"/>
    <path d="M35 33h18v7H35Z" fill="#0F766E"/>
    <text x="79" y="42" fill="#17251F" font-family="Arial, sans-serif" font-size="19" font-weight="800">Local journal path</text>
    <text x="79" y="65" fill="#56665D" font-family="Arial, sans-serif" font-size="12">Always available • on-device</text>
    <rect x="24" y="94" width="104" height="43" rx="11" fill="#D9F5E8"/>
    <text x="76" y="120" text-anchor="middle" fill="#0F766E" font-family="Arial, sans-serif" font-size="11" font-weight="800">ViewModel</text>
    <path d="M128 115h28" stroke="#0F766E" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="163" y="94" width="108" height="43" rx="11" fill="#E9F0EB"/>
    <text x="217" y="120" text-anchor="middle" fill="#153D35" font-family="Arial, sans-serif" font-size="11" font-weight="800">Repository</text>
    <path d="M271 115h28" stroke="#0F766E" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="306" y="94" width="82" height="43" rx="11" fill="#153D35"/>
    <text x="347" y="120" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="11" font-weight="800">Room</text>
  </g>

  <g transform="translate(466 330)">
    <rect width="413" height="164" rx="22" fill="#FFFFFF" stroke="#C7D5CC" filter="url(#shadow)"/>
    <circle cx="44" cy="43" r="22" fill="#FFE2DB"/>
    <circle cx="42" cy="41" r="9" fill="none" stroke="#F9735B" stroke-width="3"/>
    <line x1="48" y1="48" x2="56" y2="56" stroke="#F9735B" stroke-width="3"/>
    <text x="79" y="42" fill="#17251F" font-family="Arial, sans-serif" font-size="19" font-weight="800">Optional search path</text>
    <text x="79" y="65" fill="#56665D" font-family="Arial, sans-serif" font-size="12">Only with local credentials + user action</text>
    <rect x="24" y="94" width="112" height="43" rx="11" fill="#D9F5E8"/>
    <text x="80" y="120" text-anchor="middle" fill="#0F766E" font-family="Arial, sans-serif" font-size="11" font-weight="800">RetrofitClient</text>
    <path d="M136 115h31" stroke="#0F766E" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="174" y="94" width="102" height="43" rx="11" fill="#E9F0EB"/>
    <text x="225" y="120" text-anchor="middle" fill="#153D35" font-family="Arial, sans-serif" font-size="11" font-weight="800">NutritionApi</text>
    <path d="M276 115h31" stroke="#0F766E" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="314" y="94" width="74" height="43" rx="11" fill="#F9735B"/>
    <text x="351" y="120" text-anchor="middle" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="10" font-weight="800">HTTPS</text>
  </g>

  <path d="M879 221H968" stroke="#0F766E" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M879 412H968" stroke="#0F766E" stroke-width="3" marker-end="url(#arrow)"/>

  <g transform="translate(992 140)" filter="url(#shadow)">
    <rect width="376" height="164" rx="22" fill="#D9F5E8"/>
    <text x="28" y="42" fill="#0F766E" font-family="Arial, sans-serif" font-size="13" font-weight="800" letter-spacing="1">PRIVATE DEVICE DATA</text>
    <text x="28" y="78" fill="#153D35" font-family="Arial, sans-serif" font-size="20" font-weight="800">MealMetric database</text>
    <text x="28" y="105" fill="#56665D" font-family="Arial, sans-serif" font-size="13">Meals • calories • types • dates</text>
    <text x="28" y="129" fill="#56665D" font-family="Arial, sans-serif" font-size="13">Local photo URI references</text>
  </g>

  <g transform="translate(992 330)" filter="url(#shadow)">
    <rect width="376" height="164" rx="22" fill="#FFE2DB"/>
    <text x="28" y="42" fill="#C74733" font-family="Arial, sans-serif" font-size="13" font-weight="800" letter-spacing="1">EXTERNAL SERVICE BOUNDARY</text>
    <text x="28" y="78" fill="#653127" font-family="Arial, sans-serif" font-size="20" font-weight="800">Nutritionix</text>
    <text x="28" y="105" fill="#784A42" font-family="Arial, sans-serif" font-size="13">Receives the initiated food query</text>
    <text x="28" y="129" fill="#784A42" font-family="Arial, sans-serif" font-size="13">Returns nutrition estimates</text>
  </g>

  <rect x="72" y="540" width="1296" height="42" rx="21" fill="#153D35"/>
  <text x="720" y="566" text-anchor="middle" fill="#D9F5E8" font-family="Arial, sans-serif" font-size="13" font-weight="700">Photos stay local • backups disabled • manual logging remains available without credentials</text>
</svg>
